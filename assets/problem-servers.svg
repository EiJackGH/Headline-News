<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <!-- Definitions for gradients and drop shadows -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="serverOfflineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#020617" flood-opacity="0.4" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="24"/>

  <!-- Subtle Background Grid/Tech Lines -->
  <g stroke="#334155" stroke-width="1" opacity="0.25">
    <path d="M 0,50 L 500,50 M 0,100 L 500,100 M 0,150 L 500,150 M 0,200 L 500,200 M 0,250 L 500,250 M 0,300 L 500,300 M 0,350 L 500,350" />
    <path d="M 50,0 L 50,400 M 100,0 L 100,400 M 150,0 L 150,400 M 200,0 L 200,400 M 250,0 L 250,400 M 300,0 L 300,400 M 350,0 L 350,400 M 400,0 L 400,400 M 450,0 L 450,400" />
  </g>

  <!-- Connection Line (Broken) -->
  <path d="M 100,240 L 400,240" stroke="#ef4444" stroke-width="4" stroke-dasharray="8 8" opacity="0.6"/>

  <!-- Main Group with Shadow -->
  <g filter="url(#dropShadow)">

    <!-- Left Server Rack (Offline/Warning) -->
    <g transform="translate(110, 110)">
      <!-- Chassis -->
      <rect width="110" height="180" rx="12" fill="url(#serverOfflineGrad)" stroke="#1e293b" stroke-width="3"/>

      <!-- Top Vent/Details -->
      <line x1="20" y1="15" x2="90" y2="15" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
      <line x1="20" y1="23" x2="90" y2="23" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>

      <!-- Server Blades -->
      <!-- Blade 1 -->
      <rect x="10" y="38" width="90" height="36" rx="6" fill="#1e293b" />
      <circle cx="22" cy="56" r="4" fill="#ef4444" filter="url(#glow)"/> <!-- Red warning indicator -->
      <circle cx="34" cy="56" r="3" fill="#475569" />
      <line x1="50" y1="56" x2="85" y2="56" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

      <!-- Blade 2 -->
      <rect x="10" y="82" width="90" height="36" rx="6" fill="#1e293b" />
      <circle cx="22" cy="100" r="4" fill="#f59e0b" filter="url(#glow)"/> <!-- Amber warning indicator -->
      <circle cx="34" cy="100" r="3" fill="#475569" />
      <line x1="50" y1="100" x2="85" y2="100" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

      <!-- Blade 3 -->
      <rect x="10" y="126" width="90" height="36" rx="6" fill="#1e293b" />
      <circle cx="22" cy="144" r="4" fill="#94a3b8"/> <!-- Dead indicator -->
      <circle cx="34" cy="144" r="3" fill="#475569" />
      <line x1="50" y1="144" x2="85" y2="144" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Right Server Rack (Offline/Warning) -->
    <g transform="translate(280, 110)">
      <!-- Chassis -->
      <rect width="110" height="180" rx="12" fill="url(#serverOfflineGrad)" stroke="#1e293b" stroke-width="3"/>

      <!-- Top Vent/Details -->
      <line x1="20" y1="15" x2="90" y2="15" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
      <line x1="20" y1="23" x2="90" y2="23" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>

      <!-- Server Blades -->
      <!-- Blade 1 -->
      <rect x="10" y="38" width="90" height="36" rx="6" fill="#1e293b" />
      <circle cx="22" cy="56" r="4" fill="#dc2626" filter="url(#glow)"/> <!-- Red warning indicator -->
      <circle cx="34" cy="56" r="3" fill="#475569" />
      <line x1="50" y1="56" x2="85" y2="56" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

      <!-- Blade 2 -->
      <rect x="10" y="82" width="90" height="36" rx="6" fill="#1e293b" />
      <circle cx="22" cy="100" r="4" fill="#94a3b8"/> <!-- Dead indicator -->
      <circle cx="34" cy="100" r="3" fill="#475569" />
      <line x1="50" y1="100" x2="85" y2="100" stroke="#475569" stroke-width="4" stroke-linecap="round"/>

      <!-- Blade 3 -->
      <rect x="10" y="126" width="90" height="36" rx="6" fill="#1e293b" />
      <circle cx="22" cy="144" r="4" fill="#dc2626" filter="url(#glow)"/> <!-- Red warning indicator -->
      <circle cx="34" cy="144" r="3" fill="#475569" />
      <line x1="50" y1="144" x2="85" y2="144" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Cloud with Broken Connection Symbol overlaying server stacks -->
    <g transform="translate(190, 60)" filter="url(#dropShadow)">
      <!-- Cloud Base -->
      <path d="M 30,50
               A 25,25 0 0,1 60,25
               A 35,35 0 0,1 120,20
               A 25,25 0 0,1 145,45
               A 20,20 0 0,1 140,75
               L 35,75
               A 20,20 0 0,1 30,50 Z"
            fill="#334155" stroke="#475569" stroke-width="3"/>
      <!-- Small Lightning / Disconnect bolt -->
      <path d="M 85,30 L 70,55 L 90,55 L 75,80" stroke="#ef4444" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
    </g>

    <!-- Large Warning Exclamation Sign in Foreground -->
    <g transform="translate(210, 200)" filter="url(#dropShadow)">
      <!-- Yellow-Orange Warning Triangle -->
      <polygon points="40,10 80,80 0,80" fill="url(#amberGrad)" stroke="#1e293b" stroke-width="4" stroke-linejoin="round"/>
      <!-- Exclamation Mark inside triangle -->
      <path d="M 40,32 L 40,56" stroke="#1e293b" stroke-width="5" stroke-linecap="round"/>
      <circle cx="40" cy="68" r="3.5" fill="#1e293b"/>
    </g>

  </g>

  <!-- Pulsing Offline Text Overlay (clean font) -->
  <text x="250" y="355" fill="#f1f5f9" font-family="'Inter', sans-serif" font-size="16" font-weight="800" letter-spacing="2" text-anchor="middle" opacity="0.9">
    CONNECTION TIMEOUT
  </text>
  <text x="250" y="375" fill="#ef4444" font-family="'Inter', sans-serif" font-size="11" font-weight="700" letter-spacing="1" text-anchor="middle" opacity="0.8">
    HTTP 503 · SERVICE UNAVAILABLE
  </text>
</svg>
